name: notification-service-ci

on:
  # R5 1944 (monorepo tradeoff, namerno): trigger se NE okida na 'banka2_bek/**'.
  # notification-service deli tipove (NotificationMessage, NotificationKind) SAMO kroz
  # 'banka2-contracts' modul (koji JESTE u paths) → contract promene rebuild-uju ovaj
  # servis. banka_core-interne klase nisu compile-time dependency, pa contract drift ne
  # moze nastati ovim putem. Pokriveno integ/E2E na main-u.
  push:
    branches: [main]
    paths:
      - 'notification-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/notification-service-ci.yml'
      - '.github/workflows/notification-service-cd.yml'
      - 'k8s/**'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'notification-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/notification-service-ci.yml'
      - '.github/workflows/notification-service-cd.yml'
      - 'k8s/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: notification-service/pom.xml

      - name: Build & test notification-service
        # -am gradi upstream reactor module (banka2-contracts) pre notification-service
        run: mvn -B -pl notification-service -am verify
