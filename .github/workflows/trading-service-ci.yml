name: trading-service-ci

on:
  # R5 1944 (monorepo tradeoff, namerno): trigger se NE okida na 'banka2_bek/**'.
  # banka-core deli DTO-e ka trading-u SAMO kroz 'banka2-contracts' modul (koji JESTE
  # u paths) — DTO promene u contracts-u rebuild-uju trading. banka_core-interne klase
  # nisu compile-time dependency trading-a, pa contract drift ne moze nastati ovim putem.
  # Cena: izmena u banka2_bek koja sluci slomi cross-service runtime ugovor (ne preko
  # contracts modula) nece pokrenuti trading CI — pokriveno integ/E2E na main-u.
  push:
    branches: [main]
    paths:
      - 'trading-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/trading-service-ci.yml'
      - '.github/workflows/trading-service-cd.yml'
      - 'k8s/**'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'trading-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/trading-service-ci.yml'
      - '.github/workflows/trading-service-cd.yml'
      - 'k8s/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: trading-service/pom.xml

      - name: Build & test trading-service
        # -am gradi upstream reactor module (banka2-contracts) pre trading-service
        run: mvn -B -pl trading-service -am verify
