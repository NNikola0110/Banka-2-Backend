spring.application.name=notification-service
server.port=8083

# ── Monitoring / metrike (Actuator + Prometheus) ─────────────────────────────
# /actuator/prometheus dolazi u Prometheus exposition formatu (scrape svake 15s).
# management.metrics.tags.application razlikuje metrike ovog servisa od
# banka-core / trading-service kad se scrape-uju u jedan Prometheus.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=read-only
management.metrics.tags.application=notification-service

# Kubernetes readiness/liveness probes — /actuator/health/liveness i /actuator/health/readiness
# se izlazu kao zasebni endpoint-i (Spring Boot 2.3+). Liveness = "JVM zivi", Readiness =
# "spreman za saobracaj". K8s kubelet ih pinguje za pod lifecycle management.
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Mail (SMTP) - preseljeno iz monolita. MAIL_PASSWORD se postavlja preko env-a.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.username=${MAIL_USERNAME:banka2.notifications@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

# URL baze za linkove u email-ovima (frontend rute)
notification.activation-url-base=${NOTIFICATION_ACTIVATION_URL_BASE:http://localhost:3000}
notification.password-reset-url-base=${NOTIFICATION_PASSWORD_RESET_URL_BASE:http://localhost:3000}
notification.password-reset-page-path=/reset-password
notification.activation-page-path=/activate-account

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
