worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS resolver - koristi se za variable-based proxy_pass
    # ispod (nginx razresava `backend`/`trading-service` pri svakom zahtevu,
    # ne pri config-load-u).
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # Gateway ne sme da bude tesnji od monolita - default nginx limit je 1m,
        # sto bi 413-ovalo npr. /assistant/chat-multipart audio upload. 20m da
        # gateway ostane transparentan (monolit zadrzava svoje multipart limite).
        client_max_body_size 20m;

        # ── Zajednicki proxy header-i ────────────────────────────────────────
        # Definisani na `server` nivou — nginx ih nasledjuje u sve `location`
        # blokove ispod, pa se ne ponavljaju. `proxy_pass` je jedino sto se
        # razlikuje po ruti.
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ====================================================================
        # POD-FAZA 2f CUTOVER — path-based routing.
        #
        # Trgovinski domen (orderi, portfolio, listings, berze, OTC, opcije,
        # margin, fondovi, aktuari, porez, profit-bank) servira `trading-service`
        # na portu 8082. Sve ostalo (auth, racuni, kartice, placanja, krediti,
        # interbank, stednja, Arbitro, ...) servira monolit `backend` na 8080.
        #
        # nginx prefix-matching: `location /otc` poklapa SAMO URI koji pocinje
        # sa `/otc` — `/interbank/otc/...` pocinje sa `/interbank` pa NE upada
        # u trgovinsko `/otc` pravilo (ostaje na backend-u kroz catch-all).
        # `/internal/**` je servis-ka-servis (ne ide kroz gateway) — nema rute.
        #
        # Variable-based proxy_pass (`set $up ...; proxy_pass http://$up;`):
        # nginx NE razresava host pri config-load-u (pa `nginx -t` prolazi i
        # standalone), vec pri svakom zahtevu preko `resolver`-a — otporno na
        # slucaj da backend kontejner jos nije gore u trenutku startup-a
        # gateway-a (static `upstream` blok bi tu hard-fail-ovao).
        # ====================================================================

        # ── Trgovinski domen -> trading-service:8082 ─────────────────────────
        location /orders {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /portfolio {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /tax {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /funds {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /actuaries {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /listings {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /exchanges {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /options {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /margin-accounts {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # `/interbank/otc/**` (Celina 5 inter-bank) NE upada ovde — nginx prefix
        # match: `/interbank/otc` pocinje sa `/interbank`, ne `/otc`. Inter-bank
        # OTC ostaje na monolitu kroz catch-all `location /`.
        location /otc {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /profit-bank {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # ── Skeleton trgovinski paketi (Faza 2e) — B5/B6/B8/B9 -> trading-service ──
        # Cenovni alarmi, watchlist, trajni nalozi (DCA), dividende na akcije.
        # `/admin/dividends` je zaseban prefiks (NE pocinje sa `/dividends`), pa
        # mu treba sopstveni `location` blok da ne upadne u catch-all.
        location /price-alerts {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /watchlists {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /recurring-orders {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /dividends {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /admin/dividends {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # ── Catch-all: bankarski domen (monolit banka-core) -> backend:8080 ──
        # auth, accounts, cards, payments, transfers, loans, clients, employees,
        # interbank (+ interbank/otc), savings, branches, games, assistant
        # (Arbitro SSE), notifications, internal/fx, ...
        location / {
            set $banka_core "backend:8080";
            proxy_pass http://$banka_core;
            # SSE (Arbitro /assistant/chat) - bez buffering-a, dug timeout.
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
