worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # P2-config-2 (R4 1784): ne odaj nginx verziju u `Server:` header-u ni na
    # error stranicama (smanjuje version-fingerprinting povrsinu za napadace).
    server_tokens off;

    # Docker embedded DNS resolver - koristi se za variable-based proxy_pass
    # ispod (nginx razresava `backend`/`trading-service` pri svakom zahtevu,
    # ne pri config-load-u).
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # Gateway ne sme da bude tesnji od monolita - default nginx limit je 1m,
        # sto bi 413-ovalo npr. /assistant/chat-multipart audio upload. 20m da
        # gateway ostane transparentan (monolit zadrzava svoje multipart limite).
        client_max_body_size 20m;

        # ‚îÄ‚îÄ Zajednicki proxy header-i ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        # Definisani na `server` nivou ‚Äî nginx ih nasledjuje u sve `location`
        # blokove ispod, pa se ne ponavljaju. `proxy_pass` je jedino sto se
        # razlikuje po ruti.
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ====================================================================
        # POD-FAZA 2f CUTOVER ‚Äî path-based routing.
        #
        # Trgovinski domen (orderi, portfolio, listings, berze, OTC, opcije,
        # margin, fondovi, aktuari, porez, profit-bank) servira `trading-service`
        # na portu 8082. Sve ostalo (auth, racuni, kartice, placanja, krediti,
        # interbank, stednja, Arbitro, ...) servira monolit `backend` na 8080.
        #
        # nginx prefix-matching: `location /otc` poklapa SAMO URI koji pocinje
        # sa `/otc` ‚Äî `/interbank/otc/...` pocinje sa `/interbank` pa NE upada
        # u trgovinsko `/otc` pravilo (ostaje na backend-u kroz catch-all).
        # `/internal/**` je servis-ka-servis (ne ide kroz gateway) ‚Äî nema rute.
        #
        # Variable-based proxy_pass (`set $up ...; proxy_pass http://$up;`):
        # nginx NE razresava host pri config-load-u (pa `nginx -t` prolazi i
        # standalone), vec pri svakom zahtevu preko `resolver`-a ‚Äî otporno na
        # slucaj da backend kontejner jos nije gore u trenutku startup-a
        # gateway-a (static `upstream` blok bi tu hard-fail-ovao).
        # ====================================================================

        # ‚îÄ‚îÄ Trgovinski domen -> trading-service:8082 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        location /orders {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /portfolio {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /tax {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /funds {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /actuaries {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /listings {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /exchanges {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /options {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /margin-accounts {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # `/interbank/otc/**` (Celina 5 inter-bank) NE upada ovde ‚Äî nginx prefix
        # match: `/interbank/otc` pocinje sa `/interbank`, ne `/otc`. Inter-bank
        # OTC ostaje na monolitu kroz catch-all `location /`.
        location /otc {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /profit-bank {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # ‚îÄ‚îÄ Audit log (B7 / TODO_final Sc40-46) -> trading-service:8082 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        # KLJUCNO: i banka-core i trading-service izlazu @RequestMapping("/audit")
        # (svaki sa svojom audit_logs tabelom u svojoj bazi). Bez ove rute /audit
        # je upadao u catch-all `location /` -> banka-core, pa su TRGOVINSKI audit
        # zapisi (LIMIT_CHANGED, ORDER_APPROVED, TAX_RUN_TRIGGERED, FUND_*) bili
        # NEDOSTIZNI kroz gateway ‚Äî admin/supervizor ih nikad nije video iz portala
        # (FE+Mobile zovu goli `/audit`). TODO_testovi Sc40/41/43/44/45 su bas ti
        # trgovinski dogadjaji, pa /audit mora ici na trading-service.
        #
        # Bankarski audit (LOAN_*/PAYMENT_*/CARD_*/SAVINGS_*/TRANSFER_*/...) ostaje
        # dostizan kroz Mudrinic alias `location ^~ /banka-core/` (rewrite-uje
        # /banka-core/audit -> /audit na backend:8080), tako da ova ruta NE regresira
        # banka-core audit vidljivost. nginx prefix-match: `/audit` poklapa /audit i
        # /audit/{id} i /audit/resource/**; ne dira /banka-core/audit (duzi ^~ alias
        # pobedjuje). Autorizacija (ADMIN/SUPERVISOR) je u TradingSecurityConfig
        # (/audit/** matcher, P1-7).
        location /audit {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # ‚îÄ‚îÄ Skeleton trgovinski paketi (Faza 2e) ‚Äî B5/B6/B8/B9 -> trading-service ‚îÄ‚îÄ
        # Cenovni alarmi, watchlist, trajni nalozi (DCA), dividende na akcije.
        # `/admin/dividends` je zaseban prefiks (NE pocinje sa `/dividends`), pa
        # mu treba sopstveni `location` blok da ne upadne u catch-all.
        location /price-alerts {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /watchlists {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /recurring-orders {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /dividends {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        location /admin/dividends {
            set $trading_upstream "trading-service:8082";
            proxy_pass http://$trading_upstream;
        }

        # ====================================================================
        # MUDRINIC FORMAT ALIASES ‚Äî /naziv-servisa/* path prefix.
        #
        # Ova 3 location bloka prepoznavu /banka-core/*, /trading-service/*,
        # /notification-service/* prefiks-rute i rewrite-uju u native path
        # PRE proxy_pass-a. Tako FE moze koristiti i kratke `/api/orders`
        # (catch-all path-based routing nize) i Mudrinic format `https://domen/
        # trading-service/orders` (direktan service name prefix).
        # ====================================================================

        # NOTE 1: `set` MORA biti pre `rewrite ... break;` ‚Äî flag `break`
        # zaustavlja rewrite-phase, pa bi se `set` nakon `break` preskocio,
        # promenljiva ostala prazna i nginx bacio 500 "no host in upstream".
        #
        # NOTE 2: kad proxy_pass koristi variable za host, nginx NE prosledjuje
        # rewritten URI automatski ‚Äî moramo explicitno appendovati
        # `$uri$is_args$args` da bi rewrite-ovani path stigao do upstream-a.
        location ^~ /banka-core/ {
            set $banka_core_upstream "backend:8080";
            rewrite ^/banka-core/(.*)$ /$1 break;
            proxy_pass http://$banka_core_upstream$uri$is_args$args;
        }

        location ^~ /trading-service/ {
            set $trading_alias_upstream "trading-service:8082";
            rewrite ^/trading-service/(.*)$ /$1 break;
            proxy_pass http://$trading_alias_upstream$uri$is_args$args;
        }

        # R3 1565 SEC fix: ne izlazi notification-service actuator (prometheus/metrics/
        # health/...) javno kroz gateway ‚Äî curio bi heap/thread/Hikari/Rabbit metrike.
        # Prometheus scrape-uje notification-service:8083/actuator/prometheus DIREKTNO
        # po internoj mrezi (vidi monitoring/prometheus/prometheus.yml), pa blokiranje
        # na javnom ulazu ne lomi monitoring. Mora stajati PRE opsteg prefix-a (duzi
        # ^~ prefiks pobedjuje, ali eksplicitan redosled je citljiviji).
        location ^~ /notification-service/actuator {
            return 404;
        }

        location ^~ /notification-service/ {
            set $notification_upstream "notification-service:8083";
            rewrite ^/notification-service/(.*)$ /$1 break;
            proxy_pass http://$notification_upstream$uri$is_args$args;
        }

        # ‚îÄ‚îÄ Catch-all: bankarski domen (monolit banka-core) -> backend:8080 ‚îÄ‚îÄ
        # auth, accounts, cards, payments, transfers, loans, clients, employees,
        # interbank (+ interbank/otc), savings, branches, games, assistant
        # (Arbitro SSE), notifications, internal/fx, ...
        location / {
            set $banka_core "backend:8080";
            proxy_pass http://$banka_core;
            # SSE (Arbitro /assistant/chat) - bez buffering-a, dug timeout.
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
