worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS resolver - koristi se za variable-based proxy_pass
    # ispod (nginx razresava `backend` pri svakom zahtevu, ne pri config-load-u).
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # Gateway ne sme da bude tesnji od monolita - default nginx limit je 1m,
        # sto bi 413-ovalo npr. /assistant/chat-multipart audio upload. 20m da
        # gateway ostane transparentan (monolit zadrzava svoje multipart limite).
        client_max_body_size 20m;

        # Faza 0: SVE ide na monolit. Faza 1+ dodaje location /notifications/ itd.
        location / {
            # Variable-based proxy_pass: nginx NE razresava `backend` pri
            # config-load-u (pa `nginx -t` prolazi i standalone), vec pri svakom
            # zahtevu preko `resolver`-a. Otporno na slucaj da backend kontejner
            # jos nije bio gore u trenutku startup-a gateway-a - static `upstream`
            # blok bi tu hard-fail-ovao sa "host not found in upstream".
            set $banka_core "backend:8080";
            proxy_pass http://$banka_core;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE (Arbitro /assistant/chat) - bez buffering-a, dug timeout.
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
