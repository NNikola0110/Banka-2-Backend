spring.application.name=trading-service
server.port=8082

# ── Monitoring / metrike (Actuator + Prometheus) ─────────────────────────────
# /actuator/prometheus dolazi u Prometheus exposition formatu (scrape svake 15s).
# management.metrics.tags.application razlikuje metrike ovog servisa od
# banka-core / notification-service kad se scrape-uju u jedan Prometheus.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=read-only
management.metrics.tags.application=trading-service

# Kubernetes readiness/liveness probes — /actuator/health/liveness i /actuator/health/readiness
# se izlazu kao zasebni endpoint-i (Spring Boot 2.3+). Liveness = "JVM zivi", Readiness =
# "spreman za saobracaj". K8s kubelet ih pinguje za pod lifecycle management.
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── Baza: trading_db (sopstvena, shared-nothing) ────────────────────────────
spring.datasource.url=${TRADING_DB_URL:jdbc:postgresql://localhost:6435/trading}
spring.datasource.username=${TRADING_DB_USER:tradinguser}
spring.datasource.password=${TRADING_DB_PASSWORD:tradingpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate (isto kao monolit: boolean → INTEGER radi citljivog seed-a) ────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

# ── JWT: deljeni secret sa banka-core (HS256). Trading-service NEMA bazu
#    korisnika — validira potpis + isticanje lokalno i gradi security context
#    iz claim-ova (sub, role, active). Secret MORA biti identican monolitovom. ─
# N4-a (SEC): FAIL-FAST bez JWT_SECRET — javni hardkodovan default uklonjen.
# Posto trading verifikuje ISTI secret kao banka-core (order/OTC tokeni se
# cross-verifikuju), zadrzavanje javnog default-a ovde znacilo bi da forge napad
# i dalje radi protiv trading-a iako je banka-core vec fail-fast. Test profil
# override-uje jwt.secret u src/test/resources/application-test.properties.
jwt.secret=${JWT_SECRET:?JWT_SECRET env var je obavezan - postavi ga (npr. preko .env ili K8s Secret-a); mora biti isti kao banka-core}

# ── banka-core interni seam: BankaCoreClient zove /internal/funds/** ─────────
bankacore.base-url=${BANKACORE_BASE_URL:http://localhost:8081}
# R1 401 (P2-authz-method-1, SEC): fail-fast bez hardkodovanog dev default-a
# (mirror banka-core + jwt.secret N4). MORA biti ISTA vrednost kao banka-core
# (deljeni /internal/** X-Internal-Key seam). Test profil override-uje u
# src/test/resources/application-test.properties.
internal.api-key=${INTERNAL_API_KEY:?INTERNAL_API_KEY env var je obavezan - postavi ga (npr. preko .env ili K8s Secret-a); mora biti isti kao banka-core}

# ── Berza: AlphaVantage (cene akcija). Kljucevi env-driven. ──────────────────
stock.api.keys=${STOCK_API_KEYS:demo}
stock.api.url=${STOCK_API_URL:https://www.alphavantage.co/query}

# ── Scheduleri (Faza 2f-5a cutover) ──────────────────────────────────────────
# trading-service je sad live vlasnik trgovinskih schedulera (order engine,
# price refresh 15min, OTC/option expiry, tax, fund snapshot, margin check).
# SchedulingConfig (@EnableScheduling) je gejtovan ovim property-jem; default
# true. Test profil ga gasi za deterministican @SpringBootTest kontekst.
trading.scheduling.enabled=${TRADING_SCHEDULING_ENABLED:true}

# P2-perf-nplus1-1 (R5 1904): scheduler-starvation fix. Spring-ov default
# TaskScheduler je SINGLE-THREAD (pool=1) — sa 30+ @Scheduled poslova jedan
# spor tick (npr. price-refresh koji udara AlphaVantage preko mreze, ili
# order-engine ciklus) blokira SVE ostale: order izvrsavanje, SAGA tajmere,
# margin-check, OTC/option expiry. Pool >=5 daje paralelnu izolaciju da spor
# I/O tick ne gladuje kriticne (order/SAGA) poslove. ShedLock (N3) i dalje
# garantuje cross-replica jednokratnost po poslu; pool je samo intra-JVM
# concurrency. Override preko TASK_SCHEDULING_POOL_SIZE ako treba.
spring.task.scheduling.pool.size=${TASK_SCHEDULING_POOL_SIZE:5}

# ── InfluxDB: time-series OHLCV (W1-T6) — InfluxConfig/Recorder/QueryService
#    bean-ovi su @ConditionalOnProperty=true; env override moguc preko
#    BANKA2_INFLUX_ENABLED=false za testove/lokalni rad bez InfluxDB stack-a. ─
banka2.influx.enabled=${BANKA2_INFLUX_ENABLED:true}

# ── RabbitMQ: margin-call notifikacija ka notification-service (Faza 2f-5a) ───
# trading-service je publisher (MARGIN_ACCOUNT_BLOCKED). RabbitConfig registruje
# samo MessageConverter — bez topologije, @SpringBootTest ne trazi broker.
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Model B SAGA fault-injection (X-Saga-* headeri) — SAMO za chaos/CI build. Release: false.
saga.chaos.enabled=${SAGA_CHAOS_ENABLED:false}

# ── Sc27: minimalna kolicina za trgovanje ────────────────────────────────────
# OrderValidationService odbija order sa quantity ispod ovog praga (400 + poruka
# o min kolicini). Default 1 cuva postojece ponasanje (quantity > 0); operater
# moze podici prag bez izmene koda.
trading.order.min-quantity=${TRADING_ORDER_MIN_QUANTITY:1}
