# H2 u PostgreSQL modu — isti obrazac kao banka2_bek testovi
spring.datasource.url=jdbc:h2:mem:trading_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

jwt.secret=test-jwt-secret-do-not-use-in-prod-32-bytes-minimum-required-for-hs256
bankacore.base-url=http://localhost:18081
internal.api-key=test-internal-key

# ── Berza test profil: AlphaVantage stub kljuc, Influx iskljucen ──────────────
stock.api.keys=demo
stock.api.url=https://www.alphavantage.co/query
banka2.influx.enabled=false

# ── Scheduleri iskljuceni u testovima ─────────────────────────────────────────
# SchedulingConfig (@EnableScheduling) je gejtovan ovim property-jem (default
# true). U test profilu gasimo da @SpringBootTest kontekst bude deterministican —
# inace bi 10s order-engine ciklus mogao da okine usred testa sa mockovanim
# BankaCoreClient-om. Scheduler testovi pozivaju metode eksplicitno, pa ne zavise
# od auto-okidanja.
trading.scheduling.enabled=false
