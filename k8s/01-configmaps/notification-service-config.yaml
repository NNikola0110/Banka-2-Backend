apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: configmap
data:
  # ── RabbitMQ (consumer) ───────────────────────────────────────────────────
  # USERNAME/PASSWORD iz Secret-a `rabbitmq-credentials` u Deployment env block-u.
  SPRING_RABBITMQ_HOST: "rabbitmq-svc"
  SPRING_RABBITMQ_PORT: "5672"

  # ── Email (Gmail SMTP) ───────────────────────────────────────────────────
  # MAIL_USERNAME je non-sensitive (banka2.notifications@gmail.com),
  # MAIL_PASSWORD ide u Secret (Gmail app password).
  MAIL_USERNAME: "banka2.notifications@gmail.com"

  # ── Notification URL base (deep-link u FE iz email-a) ────────────────────
  # Mudrinic dodeli pravi domain; default placeholder za K8s deploy.
  NOTIFICATION_ACTIVATION_URL_BASE: "https://banka-2.radenkovic.rs"
  NOTIFICATION_PASSWORD_RESET_URL_BASE: "https://banka-2.radenkovic.rs"

  # ── Spring Boot Actuator probes ──────────────────────────────────────────
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
