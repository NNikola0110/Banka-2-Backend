apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: configmap
data:
  # Frontend runtime config - cita se kroz window._env_ pri container startup-u.
  # docker-entrypoint.sh u frontend image-u radi envsubst < config.template.js > config.js.
  # Promena ovih vrednosti + rollout restart frontend-a = nova konfig bez rebuild-a.
  API_URL: "/api"
  OUR_BANK_CODE: "RN-222"
  ENV: "production"
