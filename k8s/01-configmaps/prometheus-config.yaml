apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: configmap
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: banka2-k8s
        environment: production

    # Alert rules - mount-uje se iz ovog istog ConfigMap-a.
    rule_files:
      - /etc/prometheus/alert-rules.yml

    # AlertManager listener — Prometheus salje alert-e, AM rute na Discord.
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager-svc:9093

    scrape_configs:
      # Prometheus self-metrike.
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      # K8s pod auto-discovery — scrape sve pod-ove sa anotacijom
      # `prometheus.io/scrape: "true"` u namespace-u banka2-tim2.
      # Spring Boot pod-ovi imaju anotacije:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/path: "/actuator/prometheus"
      #   prometheus.io/port: "8080" | "8082" | "8083"
      - job_name: banka2_kubernetes_pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - banka2-tim2
        relabel_configs:
          # Scrape samo ako anotacija `prometheus.io/scrape` == "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Path iz anotacije `prometheus.io/path` (default /metrics).
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Port iz anotacije `prometheus.io/port` (default container port).
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Preuzmi sve labele sa pod-a kao Prometheus labele.
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          # Job naziv = service name iz pod label-a `app.kubernetes.io/name`.
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: job
          # Dodaj namespace + pod naziv kao labele.
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Static fallback — eksplicitni scrape monitoring stack-a samog.
      - job_name: alertmanager
        static_configs:
          - targets:
              - alertmanager-svc:9093

      - job_name: grafana
        static_configs:
          - targets:
              - grafana-svc:3000

  # Alert rules — kopirano 1:1 iz Banka-2-Backend/monitoring/prometheus/alert-rules.yml.
  alert-rules.yml: |
    groups:
      - name: banka2_availability
        interval: 30s
        rules:
          - alert: BackendDown
            expr: up{job="banka-core"} == 0
            for: 1m
            labels:
              severity: critical
              team: backend
            annotations:
              summary: "Banka2 backend nedostupan"
              description: "Backend instance {{ $labels.instance }} nije odgovorila na scrape vec preko 1 minuta."

          - alert: PrometheusTargetMissing
            expr: up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus target nedostupan"
              description: "Job {{ $labels.job }} target {{ $labels.instance }} ne odgovara vec 5 minuta."

      - name: banka2_performance
        interval: 30s
        rules:
          - alert: HighRequestLatency
            expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=~"banka-core|trading-service"}[5m])) by (le, uri)) > 2
            for: 5m
            labels:
              severity: warning
              team: backend
            annotations:
              summary: "Visok latency na {{ $labels.uri }}"
              description: "p95 latency je {{ $value | humanizeDuration }} na {{ $labels.uri }} tokom poslednih 5 minuta."

          - alert: HighErrorRate
            expr: |
              sum(rate(http_server_requests_seconds_count{job=~"banka-core|trading-service",status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{job=~"banka-core|trading-service"}[5m]))
              > 0.10
            for: 5m
            labels:
              severity: critical
              team: backend
            annotations:
              summary: "Visok 5xx error rate"
              description: "Preko 10% HTTP odgovora vraca 5xx tokom poslednjih 5 minuta. Trenutni rate: {{ $value | humanizePercentage }}."

          - alert: EmailDeliveryFailureSpike
            expr: increase(banka2_emails_failed_total{reason="smtp_error"}[5m]) > 25
            for: 2m
            labels:
              severity: warning
              team: notification
            annotations:
              summary: "Email SMTP failures > 25 u 5 min"
              description: "Notification-service prijavljuje > 25 SMTP failure-a u poslednjih 5 min."

          - alert: RabbitDlqGrowing
            expr: banka2_dlq_depth > 10
            for: 5m
            labels:
              severity: warning
              team: notification
            annotations:
              summary: "RabbitMQ DLQ ima > 10 poruka"
              description: "Notification DLQ raste — proveri poison message-e."

      - name: banka2_security
        interval: 15s
        rules:
          - alert: BruteForceLogin
            expr: rate(banka2_login_failure_total[1m]) > 5
            for: 1m
            labels:
              severity: critical
              team: security
            annotations:
              summary: "Sumnja na brute-force login napad"
              description: "Stopa neuspelih login zahteva je {{ $value | humanize }}/s tokom poslednje minute."

          - alert: RateLimitFloodActive
            expr: rate(banka2_rate_limit_hit_total[1m]) > 1
            for: 2m
            labels:
              severity: warning
              team: security
            annotations:
              summary: "Aktivan rate-limit flood na auth endpoint-ima"
              description: "{{ $value | humanize }} 429 odgovora u sekundi."

      - name: banka2_resources
        interval: 30s
        rules:
          - alert: HighJvmHeapUsage
            expr: |
              sum(jvm_memory_used_bytes{job=~"banka-core|trading-service|notification-service",area="heap"}) by (job, kubernetes_pod_name)
              /
              sum(jvm_memory_max_bytes{job=~"banka-core|trading-service|notification-service",area="heap"}) by (job, kubernetes_pod_name)
              > 0.90
            for: 5m
            labels:
              severity: warning
              team: backend
            annotations:
              summary: "Visoka JVM heap upotreba"
              description: "Heap je na {{ $value | humanizePercentage }} kapaciteta na {{ $labels.kubernetes_pod_name }}."

          - alert: DatabaseConnectionPoolExhausted
            expr: hikaricp_connections_active{job=~"banka-core|trading-service"} >= hikaricp_connections_max{job=~"banka-core|trading-service"}
            for: 2m
            labels:
              severity: critical
              team: backend
            annotations:
              summary: "DB connection pool exhausted"
              description: "Sve {{ $labels.pool }} konekcije zauzete vec 2 minuta. Verovatan connection leak."

      - name: banka2_trading
        interval: 30s
        rules:
          - alert: MarginCallsSurge
            expr: increase(banka2_margin_calls_total[5m]) > 3
            for: 2m
            labels:
              severity: warning
              team: trading
            annotations:
              summary: "Visok broj margin call-ova"
              description: "> 3 margin call-a u 5 min."

          - alert: OtcInterbankFailures
            expr: increase(banka2_interbank_outbound_total{status="failed"}[5m]) > 5
            for: 1m
            labels:
              severity: critical
              team: trading
            annotations:
              summary: "Inter-bank SAGA failures"
              description: "Tim 1 outbound failures > 5 u 5 min — proveri partner status."
