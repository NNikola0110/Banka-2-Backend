apiVersion: apps/v1
kind: Deployment
metadata:
  name: banka-core
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: banka-core
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: banka-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banka-core
        app.kubernetes.io/component: backend
      annotations:
        # Prometheus auto-discovery (kubernetes_sd_configs role:pod scrape).
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: banka-core
          image: ghcr.io/raf-si-2025/banka-2-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: banka-core-config
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: internal-api-key
            - secretRef:
                name: partner-tokens
            - secretRef:
                name: external-api-keys
          env:
            # DB password-i nisu u envFrom Secret-u jer Secret ima 4 razlicite
            # kljuceve a DB konekciji treba samo POSTGRES_PASSWORD - mapiramo
            # ga eksplicitno na SPRING_DATASOURCE_PASSWORD.
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: BANKA2_DATASOURCE_REPLICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            # RabbitMQ user/pass iz Secret-a (vidi k8s/02-secrets/rabbitmq-credentials.yaml.example).
            # Spring koristi SPRING_RABBITMQ_USERNAME/PASSWORD env, RabbitMQ Secret ima
            # RABBITMQ_DEFAULT_USER/PASS kljuceve (consumer i producer dele iste kredencijale).
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_USER
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_PASS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            # Spring Boot boot moze trajati 60-120s sa Hibernate ddl-auto=update.
            # 30 × 10s = 300s grace period.
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
