# =========================================================================
# Wikipedia tool sidecar (FastAPI + wikipedia 1.4 + cachetools TTL 1h).
# CPU-only, light workload. Arbitro koristi za "search Wikipedia" tool poziv.
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipedia-service
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: wikipedia-service
    app.kubernetes.io/component: arbitro
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wikipedia-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wikipedia-service
        app.kubernetes.io/component: arbitro
    spec:
      containers:
        - name: wikipedia-service
          image: ghcr.io/raf-si-2025/banka-2-wikipedia-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
