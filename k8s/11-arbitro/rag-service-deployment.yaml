# =========================================================================
# RAG tool sidecar (FastAPI + sentence-transformers + ChromaDB).
# CPU-only, moderate workload (cross-encoder rerank je CPU-intensive ali fast).
#
# NAPOMENA: ChromaDB indeks se persist-uje preko PVC. U docker-compose,
# spec docs (Info o predmetu/) se bind-mountuju i auto-indeksiraju pri prvom
# startu. U K8s nema bind-mount-a — ChromaDB ostaje prazan dok ga ne popunis
# rucno (`kubectl exec` + `python scripts/index_specs.py` posle kopiranja spec docs
# u pod preko `kubectl cp`). Vidi 11-arbitro/README.md za detalje.
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: rag-service
    app.kubernetes.io/component: arbitro
spec:
  replicas: 1
  # ChromaDB drzi state na disku — Recreate strategija (single replica + ne paralelno
  # otvarati istu bazu iz 2 pod-a).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-service
        app.kubernetes.io/component: arbitro
    spec:
      containers:
        - name: rag-service
          image: ghcr.io/raf-si-2025/banka-2-rag-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
              name: http
          # Override default entrypoint (auto-indexing trazi spec docs koje
          # nemamo u K8s) — samo pokreni uvicorn server.
          command:
            - sh
            - -c
            - exec uvicorn app.main:app --host 0.0.0.0 --port 8091
          volumeMounts:
            - name: chroma-persist
              mountPath: /app/chroma_db
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: chroma-persist
          persistentVolumeClaim:
            claimName: rag-chroma-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-chroma-data
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: rag-service
    app.kubernetes.io/component: arbitro
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
