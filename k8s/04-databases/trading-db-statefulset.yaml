apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trading-db
  namespace: banka2-tim2
  labels:
    app.kubernetes.io/name: trading-db
    app.kubernetes.io/component: database
spec:
  serviceName: trading-db-svc
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trading-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trading-db
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: trading
            - name: POSTGRES_USER
              value: tradinguser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_TRADING_PASSWORD
            - name: ANALYTICS_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: ANALYTICS_READER_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tradinguser
                - -d
                - trading
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tradinguser
                - -d
                - trading
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: init-scripts
          configMap:
            name: trading-db-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
# trading-db init scripts: 01-analytics-reader.sh + 02-analytics-tables.sql
# (1:1 kopija iz Banka-2-Backend/trading-db-init/, W2-T3 agent).
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-db-init
  namespace: banka2-tim2
data:
  01-analytics-reader.sh: |
    #!/bin/bash
    # Init script za trading_db — kreira analytics_reader read-only user-a.
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE USER analytics_reader WITH PASSWORD '${ANALYTICS_READER_PASSWORD}';
      GRANT CONNECT ON DATABASE trading TO analytics_reader;
      GRANT USAGE ON SCHEMA public TO analytics_reader;
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO analytics_reader;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO analytics_reader;
    EOSQL
    echo "analytics_reader user created."

  02-analytics-tables.sql: |
    -- Spark analytics output tabele za trading_db.

    -- analytics_daily: agregirani business metrics po danu.
    CREATE TABLE IF NOT EXISTS analytics_daily (
      id BIGSERIAL PRIMARY KEY,
      metric_date DATE NOT NULL,
      metric_name TEXT NOT NULL,
      dimensions JSONB NOT NULL DEFAULT '{}'::jsonb,
      value NUMERIC NOT NULL,
      computed_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      CONSTRAINT analytics_daily_unique UNIQUE (metric_date, metric_name, dimensions)
    );

    CREATE INDEX IF NOT EXISTS idx_analytics_daily_metric ON analytics_daily (metric_name, metric_date DESC);
    CREATE INDEX IF NOT EXISTS idx_analytics_daily_date ON analytics_daily (metric_date DESC);

    -- price_predictions: ML output za N+1 day predikcije.
    CREATE TABLE IF NOT EXISTS price_predictions (
      id BIGSERIAL PRIMARY KEY,
      symbol TEXT NOT NULL,
      prediction_date DATE NOT NULL,
      predicted_close NUMERIC NOT NULL,
      lower_bound NUMERIC NOT NULL,
      upper_bound NUMERIC NOT NULL,
      model_version TEXT NOT NULL,
      computed_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      CONSTRAINT price_predictions_unique UNIQUE (symbol, prediction_date, model_version)
    );

    CREATE INDEX IF NOT EXISTS idx_price_predictions_symbol_date ON price_predictions (symbol, prediction_date DESC);
